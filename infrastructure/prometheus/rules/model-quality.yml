groups:
  - name: ml-model-quality
    rules:
      - alert: ModelAccuracyLow
        expr: ml_model_accuracy < 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Model accuracy below threshold"
          description: "Model {{ $labels.model }} has accuracy {{ $value }} below 0.8"

      - alert: ModelInferenceLatencyHigh
        expr: histogram_quantile(0.95, sum(rate(ml_inference_latency_seconds_bucket[5m])) by (le, model_type)) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ML inference latency high"
          description: "Model type {{ $labels.model_type }} p95 latency is {{ $value }}s"

      - alert: ModelInferenceErrorRateHigh
        expr: sum(rate(ml_inference_errors_total[5m])) by (model_type) / sum(rate(ml_inference_requests_total[5m])) by (model_type) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ML inference error rate above 5%"
          description: "Model type {{ $labels.model_type }} error rate is {{ $value }}"
