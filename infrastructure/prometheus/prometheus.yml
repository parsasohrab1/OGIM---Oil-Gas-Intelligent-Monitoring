global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/data-quality.yml
  - /etc/prometheus/rules/model-quality.yml
  - /etc/prometheus/rules/executive-kpis.yml

scrape_configs:
  - job_name: "ogim-services"
    static_configs:
      - targets:
          - "auth-service:8001"
          - "data-ingestion-service:8002"
          - "ml-inference-service:8003"
          - "alert-service:8004"
          - "reporting-service:8005"
          - "command-control-service:8006"
          - "tag-catalog-service:8007"
          - "digital-twin-service:8008"
          - "dvr-service:8011"
          - "api-gateway:8000"
