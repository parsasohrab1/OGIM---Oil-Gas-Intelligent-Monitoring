[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=shared.security
    --cov=shared.security_alerts
    --cov=shared.threat_detection
    --cov=shared.input_validation
    --cov=shared.response_cache
    --cov=shared.kpi_metrics
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=85
markers =
    integration: Integration tests
    unit: Unit tests
    slow: Slow tests
    e2e: End-to-end tests
